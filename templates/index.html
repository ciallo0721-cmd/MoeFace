<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoeFace — 动漫人脸识别系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; flex-direction: column; }
header { background: linear-gradient(135deg, #4f8cff, #6c63ff); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 18px; font-weight: 600; }
header .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.green { background: #4ade80; }
.status-dot.yellow { background: #facc15; }
.status-dot.red { background: #f87171; }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: #fff; border-right: 1px solid #e5e7eb; padding: 12px; overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
.section { margin-bottom: 12px; }
.section-title { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; font-weight: 600; }
.sidebar label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 2px; }
.sidebar select, .sidebar input[type="number"], .sidebar input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; background: #f9fafb; outline: none; transition: border .15s; }
.sidebar select:focus, .sidebar input:focus { border-color: #6c63ff; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-primary { background: #6c63ff; color: #fff; }
.btn-primary:hover { background: #5b52e0; }
.btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
.btn-secondary:hover { background: #e5e7eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; margin-bottom: 4px; }
.btn-group { display: flex; gap: 4px; }
.sidebar .btn-block { margin-top: 4px; }
input[type="range"] { width: 100%; accent-color: #6c63ff; margin: 2px 0; }
.range-label { display: flex; justify-content: space-between; font-size: 11px; color: #9ca3af; }
.check-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #374151; margin: 4px 0; }
.check-row input[type="checkbox"] { accent-color: #6c63ff; }
.output-row { display: flex; gap: 4px; }
.output-row input { flex: 1; }
.dropzone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #d1d5db; border-radius: 12px; background: #fff; cursor: pointer; transition: all .2s; min-height: 200px; padding: 20px; margin-bottom: 8px; }
.dropzone.dragover { border-color: #6c63ff; background: #eef2ff; }
.dropzone.has-preview { justify-content: flex-start; padding: 8px; cursor: default; }
.dropzone-icon { font-size: 36px; color: #9ca3af; margin-bottom: 8px; }
.dropzone-text { font-size: 14px; color: #6b7280; text-align: center; }
.dropzone-text small { display: block; font-size: 12px; color: #9ca3af; margin-top: 4px; }
.preview-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.preview-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; }
.preview-results { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.7); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; max-width: 240px; }
.preview-results .result-item { margin: 2px 0; }
.preview-results .result-name { color: #4ade80; font-weight: 600; }
.preview-results .result-score { color: #facc15; }
.log-box { background: #1e1e2e; color: #a6e3a1; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; padding: 8px 10px; border-radius: 8px; height: 140px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.5; flex-shrink: 0; }
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
.log-box .log-error { color: #f87171; }
.log-box .log-warn { color: #facc15; }
.log-box .log-ok { color: #4ade80; }
.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #6c63ff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-wrap { width: 100%; margin-bottom: 8px; }
.progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4f8cff, #6c63ff); border-radius: 3px; transition: width .3s; width: 0%; }
.progress-text { font-size: 11px; color: #6b7280; margin-top: 2px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1> 🎭 MoeFace 动漫人脸识别</h1>
  <div class="status">
    <span class="status-dot yellow" id="statusDot"></span>
    <span id="statusText">连接中…</span>
  </div>
</header>

<div class="container">

<!-- 侧边栏 -->
<div class="sidebar">
  <!-- 特征库 -->
  <div class="section">
    <div class="section-title">特征库</div>
    <select id="dbSelect" style="margin-bottom:4px"></select>
    <div class="btn-group">
      <button class="btn btn-primary btn-sm btn-block" id="btnLoadDb">加载</button>
      <button class="btn btn-secondary btn-sm btn-block" id="btnRebuildDb">重建</button>
    </div>
    <div id="dbProgress" class="hidden" style="margin-top:4px">
      <div class="progress-bar"><div class="progress-fill" id="dbProgressFill"></div></div>
      <div class="progress-text" id="dbProgressText">加载中…</div>
    </div>
  </div>

  <!-- 识别参数 -->
  <div class="section">
    <div class="section-title">识别参数</div>
    <label>阈值（相似度）</label>
    <input type="range" id="thresholdSlider" min="0.10" max="0.95" step="0.01" value="0.45">
    <div class="range-label"><span>宽松</span><span id="thresholdVal">0.45</span><span>严格</span></div>

    <label>视频跳帧（每 N 帧识别一次）</label>
    <input type="number" id="skipFrames" value="2" min="1" max="30">

    <label>检测灵敏度</label>
    <input type="range" id="minNeighborsSlider" min="1" max="10" step="1" value="3">
    <div class="range-label"><span>宽松</span><span id="minNeighborsVal">3</span><span>严格</span></div>
  </div>

  <!-- 选项 -->
  <div class="section">
    <div class="section-title">选项</div>
    <div class="check-row"><input type="checkbox" id="bodyMode"><label for="bodyMode">人体姿态检测模式</label></div>
  </div>

  <!-- 保存识别视频 -->
  <div class="section">
    <div class="section-title">保存识别视频（可选）</div>
    <div class="output-row">
      <input type="text" id="outputPath" placeholder="留空则不保存">
      <button class="btn btn-secondary btn-sm" id="btnBrowse">选择</button>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="section">
    <button class="btn btn-primary btn-block" id="btnStart" disabled>打开图片/视频</button>
    <button class="btn btn-danger btn-block" id="btnStop" disabled>⏹ 停止处理</button>
  </div>

  <!-- 管理 -->
  <div class="section">
    <button class="btn btn-secondary btn-block btn-sm" id="btnAlias">管理角色别名</button>
    <button class="btn btn-secondary btn-block btn-sm" id="btnClearLog">清空日志</button>
  </div>
</div>

<!-- 主区域 -->
<div class="main">
  <!-- 进度 -->
  <div id="taskProgress" class="progress-wrap hidden">
    <div class="progress-bar"><div class="progress-fill" id="taskProgressFill"></div></div>
    <div class="progress-text" id="taskProgressText">处理中…</div>
  </div>

  <!-- 拖拽/预览区域 -->
  <div class="dropzone" id="dropzone">
    <div id="dropzoneEmpty">
      <div class="dropzone-icon">📁</div>
      <div class="dropzone-text">
        拖拽图片或视频到此处，或点击「打开图片/视频」
        <small>支持 JPG / PNG / MP4 / AVI / MKV</small>
      </div>
    </div>
    <div class="preview-wrap hidden" id="previewWrap">
      <img id="previewImg" src="" alt="预览">
      <div class="preview-results" id="previewResults"></div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="log-box" id="logBox">[系统] MoeFace Web 服务已启动\n</div>
</div>

</div>

<script>
// ═══ 状态 ═══
const state = {
  modelsReady: false,
  dbLoaded: false,
  dbName: '',
  taskId: null,
  eventSource: null,
  busy: false,
};

// ═══ DOM 引用 ═══
const $ = id => document.getElementById(id);
const statusDot = $('statusDot'), statusText = $('statusText');
const logBox = $('logBox');
const dbSelect = $('dbSelect');
const dropzone = $('dropzone'), dropzoneEmpty = $('dropzoneEmpty'), previewWrap = $('previewWrap'), previewImg = $('previewImg'), previewResults = $('previewResults');
const taskProgress = $('taskProgress'), taskProgressFill = $('taskProgressFill'), taskProgressText = $('taskProgressText');
const dbProgress = $('dbProgress'), dbProgressFill = $('dbProgressFill'), dbProgressText = $('dbProgressText');
const btnStart = $('btnStart'), btnStop = $('btnStop'), btnLoadDb = $('btnLoadDb'), btnRebuildDb = $('btnRebuildDb'), btnAlias = $('btnAlias'), btnClearLog = $('btnClearLog'), btnBrowse = $('btnBrowse');

// ═══ 日志 ═══
function log(msg, level = 'info') {
  const ts = new Date().toLocaleTimeString();
  const cls = level === 'error' ? 'log-error' : level === 'warn' ? 'log-warn' : level === 'ok' ? 'log-ok' : '';
  logBox.innerHTML += `<span class="${cls}">[${ts}] ${msg}\n</span>`;
  logBox.scrollTop = logBox.scrollHeight;
}

// ═══ 状态更新 ═══
function setStatus(text, color) {
  statusText.textContent = text;
  statusDot.className = 'status-dot ' + color;
}

// ═══ API 工具 ═══
async function api(url, opts = {}) {
  try {
    const res = await fetch(url, {
      headers: opts.body ? { 'Content-Type': 'application/json' } : {},
      ...opts,
    });
    return await res.json();
  } catch (e) {
    log(`API 请求失败: ${url} — ${e.message}`, 'error');
    return { ok: false, error: e.message };
  }
}

// ═══ 状态轮询 ═══
async function pollStatus() {
  const s = await api('/api/status');
  if (s.error) { setStatus('离线', 'red'); return; }
  state.modelsReady = s.models_ready;
  state.dbLoaded = !!s.db_loaded;
  state.dbName = s.db_name || '';
  if (!s.models_ready) {
    setStatus('模型加载中…', 'yellow');
  } else if (s.db_loaded) {
    setStatus(`就绪 · ${s.db_name}（${s.db_count} 角色）`, 'green');
    btnStart.disabled = false;
  } else {
    setStatus('就绪 · 请加载特征库', 'green');
  }
}

// ═══ 特征库列表 ═══
async function loadDbList() {
  const d = await api('/api/databases');
  dbSelect.innerHTML = d.databases.map(n => `<option value="${n}" ${n === d.current ? 'selected' : ''}>${n}</option>`).join('');
}

// ═══ 加载特征库 ═══
async function loadDatabase(rebuild = false) {
  const name = dbSelect.value;
  log(`正在${rebuild ? '重建' : '加载'}特征库: ${name}`, 'warn');
  btnLoadDb.disabled = btnRebuildDb.disabled = true;
  dbProgress.classList.remove('hidden');
  dbProgressFill.style.width = '0%';
  dbProgressText.textContent = '正在处理…';

  const r = await api('/api/database/load', {
    method: 'POST',
    body: JSON.stringify({ db_name: name, rebuild }),
  });

  btnLoadDb.disabled = btnRebuildDb.disabled = false;
  dbProgressFill.style.width = '100%';
  dbProgressText.textContent = r.ok ? `完成！共 ${r.count} 个角色` : '失败';

  if (r.ok) {
    log(`特征库已加载: ${name}（${r.count} 角色）`, 'ok');
    state.dbLoaded = true;
    state.dbName = name;
    setStatus(`就绪 · ${name}（${r.count} 角色）`, 'green');
    btnStart.disabled = false;
  } else {
    log('特征库加载失败', 'error');
  }

  setTimeout(() => dbProgress.classList.add('hidden'), 2000);
}

// ═══ 识别图片 ═══
async function recognizeFile(file) {
  if (state.busy) { log('正在处理中，请等待完成', 'warn'); return; }
  state.busy = true;
  btnStart.disabled = btnStop.disabled = true;

  const form = new FormData();
  form.append('file', file);
  form.append('threshold', $('thresholdSlider').value);
  form.append('skip_frames', $('skipFrames').value);
  form.append('min_neighbors', $('minNeighborsSlider').value);
  form.append('body_mode', $('bodyMode').checked ? '1' : '0');
  form.append('output', $('outputPath').value);

  log(`开始处理: ${file.name}`, 'info');

  try {
    const res = await fetch('/api/recognize', { method: 'POST', body: form });
    const data = await res.json();

    if (data.type === 'image') {
      // 图片：直接显示结果
      showImageResult(data);
    } else if (data.type === 'video') {
      state.taskId = data.task_id;
      taskProgress.classList.remove('hidden');
      startSSE(data.task_id);
    }
  } catch (e) {
    log(`请求失败: ${e.message}`, 'error');
    state.busy = false;
    btnStart.disabled = false;
    btnStop.disabled = true;
  }
}

function showImageResult(data) {
  dropzoneEmpty.classList.add('hidden');
  previewWrap.classList.remove('hidden');
  previewImg.src = 'data:image/jpeg;base64,' + data.image;
  previewResults.innerHTML = '';
  if (data.faces && data.faces.length) {
    data.faces.forEach(f => {
      const d = document.createElement('div');
      d.className = 'result-item';
      d.innerHTML = `<span class="result-name">${f.name}</span> <span class="result-score">${f.score.toFixed(2)}</span>`;
      previewResults.appendChild(d);
    });
  } else {
    previewResults.innerHTML = '<div class="result-item">未检测到人脸</div>';
  }
  data.logs.forEach(l => log(l));
  state.busy = false;
  btnStart.disabled = false;
}

function startSSE(taskId) {
  if (state.eventSource) state.eventSource.close();
  state.eventSource = new EventSource(`/api/task/${taskId}/stream`);

  state.eventSource.onmessage = (event) => {
    const data = JSON.parse(event.data);
    switch (data.type) {
      case 'log':
        log(data.msg, data.level || 'info');
        break;
      case 'progress':
        taskProgressFill.style.width = data.percent + '%';
        taskProgressText.textContent = data.text;
        break;
      case 'preview':
        dropzoneEmpty.classList.add('hidden');
        previewWrap.classList.remove('hidden');
        previewImg.src = 'data:image/jpeg;base64,' + data.image;
        break;
      case 'done':
        log('处理完成！', 'ok');
        taskProgress.classList.add('hidden');
        state.busy = false;
        state.eventSource.close();
        state.eventSource = null;
        btnStart.disabled = false;
        btnStop.disabled = true;
        if (data.result_url) {
          previewResults.innerHTML = `<div class="result-item">✅ <a href="${data.result_url}" target="_blank" style="color:#4ade80">下载结果视频</a></div>`;
        }
        if (data.names && data.names.length) {
          previewResults.innerHTML += `<div class="result-item">🎭 识别角色: ${data.names.join(', ')}</div>`;
        }
        break;
      case 'error':
        log(data.msg, 'error');
        taskProgress.classList.add('hidden');
        state.busy = false;
        state.eventSource.close();
        state.eventSource = null;
        btnStart.disabled = false;
        btnStop.disabled = true;
        break;
    }
  };

  state.eventSource.onerror = () => {
    log('SSE 连接断开', 'warn');
    state.eventSource.close();
    state.eventSource = null;
    state.busy = false;
    btnStart.disabled = false;
    btnStop.disabled = true;
  };

  btnStop.disabled = false;
}

// ═══ 停止处理 ═══
async function stopTask() {
  if (!state.taskId) return;
  await api(`/api/task/${state.taskId}/stop`, { method: 'POST' });
  log('已发送停止信号', 'warn');
}

// ═══ 别名编辑 ═══
async function openAliasEditor() {
  const resp = await fetch('/api/aliases');
  const data = await resp.json();
  const content = JSON.stringify(data.aliases, null, 2);
  const newContent = prompt('编辑 cname/name.json（JSON 格式）：', content);
  if (!newContent) return;
  try { JSON.parse(newContent); } catch (e) { alert('JSON 格式错误: ' + e.message); return; }
  const r = await api('/api/aliases', { method: 'PUT', body: newContent });
  if (r.ok) alert('保存成功！');
  else alert('保存失败');
}

// ═══ 文件选择 ═══
function triggerFileSelect() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.jpg,.jpeg,.png,.bmp,.webp,.gif,.mp4,.avi,.mov,.mkv,.flv,.wmv,.m4v';
  inp.onchange = () => { if (inp.files[0]) recognizeFile(inp.files[0]); };
  inp.click();
}

// ═══ 拖拽 ═══
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) recognizeFile(file);
});

// ═══ 绑定事件 ═══
btnStart.addEventListener('click', triggerFileSelect);
btnStop.addEventListener('click', stopTask);
btnLoadDb.addEventListener('click', () => loadDatabase(false));
btnRebuildDb.addEventListener('click', () => loadDatabase(true));
btnAlias.addEventListener('click', openAliasEditor);
btnClearLog.addEventListener('click', () => { logBox.innerHTML = ''; });
$('thresholdSlider').addEventListener('input', () => $('thresholdVal').textContent = parseFloat($('thresholdSlider').value).toFixed(2));
$('minNeighborsSlider').addEventListener('input', () => $('minNeighborsVal').textContent = $('minNeighborsSlider').value);
btnBrowse.addEventListener('click', () => {
  const v = prompt('输出文件路径（例如: C:\\output.mp4）', $('outputPath').value);
  if (v) $('outputPath').value = v;
});

// ═══ 初始化 ═══
(async function init() {
  log('[系统] MoeFace Web 服务启动中…');
  await loadDbList();
  await pollStatus();
  // 如果模型已就绪但特征库未加载，自动加载默认特征库
  if (state.modelsReady && !state.dbLoaded) {
    log('自动加载默认特征库…');
    await loadDatabase(false);
  }
  setInterval(pollStatus, 5000);
})();
</script>
</body>
</html>
