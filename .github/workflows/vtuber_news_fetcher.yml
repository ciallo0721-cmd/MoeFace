name: VTuber News Fetcher

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 = 北京时间 08:00，一天一次
  workflow_dispatch:

# 防止重复运行：同一 workflow 同时只跑一个，新的会排队等
concurrency:
  group: vtuber-news-fetcher
  cancel-in-progress: false

jobs:
  fetch-vtuber-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # 新闻抓取只需读权限，不需要 write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 crawl4weibo playwright curl_cffi
          playwright install chromium
          echo "✅ 依赖安装完成"

      - name: Fetch VTuber News
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
        run: python scripts/fetch_vtuber_news.py

      - name: Upload news report
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-news-report
          path: vtuber_news_report.md
          retention-days: 30