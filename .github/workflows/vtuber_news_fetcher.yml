name: VTuber News Fetcher

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-vtuber-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 也可保留，但用 PAT 后其实不需要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}   # 👈 关键：使用你的 PAT 检出

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4
          echo "✅ 依赖安装完成"

      - name: Fetch VTuber News
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
        run: python scripts/fetch_vtuber_news.py
        working-directory: .

      - name: Commit new VTuber folders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🤖 Auto: 新增VTuber角色文件夹 $(date +'%Y-%m-%d')"
          git push origin HEAD   # 👈 现在直接用 origin，因为 checkout 时已经用了 PAT
        # 不再需要手动拼接 https://token@...

      - name: Upload news report
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-news-report
          path: vtuber_news_report.md
          retention-days: 30