name: VTuber News Fetcher

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-vtuber-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 crawl4weibo playwright
          playwright install chromium
          echo "✅ 依赖安装完成"

      - name: Fetch VTuber News
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          # 可选：设置 Playwright 浏览器路径缓存
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
        run: python scripts/fetch_vtuber_news.py
        working-directory: .

      - name: Commit new VTuber folders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "📭 无新增文件夹，跳过 push"
          else
            git commit -m "🤖 Auto: 新增VTuber角色文件夹 $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi

      - name: Upload news report
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-news-report
          path: vtuber_news_report.md
          retention-days: 30