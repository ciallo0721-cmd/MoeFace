# Issue 订阅 & 自动回复工作流
# - Issue #1（邮箱征集）：提取评论中的邮箱 → 加入订阅列表 → 回复确认
# - 其他 issue：自动回复"正在发送到仓库所有者的邮箱..."

name: Issue Subscriber Handler

on:
  issue_comment:
    types: [created]

jobs:
  handle-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run subscriber handler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python scripts/issue_subscriber.py

      - name: Commit subscribers.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.txt || true
          git diff --cached --quiet || git commit -m "chore: update subscribers.txt (auto)"
          git push
        env:
          ALLOW_SELF_REPLY: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
